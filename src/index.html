<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ballistics Coordinator</title>
  <style>
    :root {
      --windowed-width: 1280px;
      --windowed-height: 720px;
      --fullscreen-width: 1920px;
      --fullscreen-height: 1080px;
      --display-width: var(--windowed-width);
      --display-height: var(--windowed-height);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #29404e 0%, #0d1420 55%, #030508 100%);
      font-family: monospace;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body.fullscreen-active {
      --display-width: var(--fullscreen-width);
      --display-height: var(--fullscreen-height);
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }

    #display-shell {
      width: var(--display-width);
      display: grid;
      gap: 12px;
    }

    #display-shell:fullscreen {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at top, #29404e 0%, #0d1420 55%, #030508 100%);
      align-content: center;
      justify-items: center;
    }

    #display-controls {
      width: var(--display-width);
      display: flex;
      justify-content: flex-end;
    }

    #display-stage {
      width: var(--display-width);
      height: var(--display-height);
      display: grid;
      place-items: center;
    }

    #fullscreen-toggle {
      padding: 10px 16px;
      border: 1px solid rgba(196, 224, 241, 0.45);
      border-radius: 999px;
      background: rgba(7, 12, 18, 0.78);
      color: #d8e8f2;
      font: 700 12px/1 monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    #fullscreen-toggle:hover {
      background: rgba(20, 34, 48, 0.92);
    }

    #fullscreen-toggle:focus-visible {
      outline: 2px solid #d8e8f2;
      outline-offset: 2px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <main id="game">
    <section id="display-shell" aria-label="Game display shell">
      <div id="display-controls">
        <button id="fullscreen-toggle" type="button" aria-pressed="false">Full Screen</button>
      </div>
      <div id="display-stage"></div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
