<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ballistics Coordinator</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #29404e 0%, #0d1420 55%, #030508 100%);
      font-family: monospace;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <main id="game"></main>
  <script src="game.js"></script>
</body>
</html>
